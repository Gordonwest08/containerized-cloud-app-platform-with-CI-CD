name: Deploy App to Dev (CD)

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - "frontend/**"
      - "backend/**"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::910541869155:role/github-actions-role
          aws-region: us-east-1

      - name: Render ECS task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs/task-definitions/frontend-task-def.json
          container-name: frontend
          image: 910541869155.dkr.ecr.us-east-1.amazonaws.com/frontend:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: frontend
          cluster: dev-cluster
          wait-for-service-stability: true
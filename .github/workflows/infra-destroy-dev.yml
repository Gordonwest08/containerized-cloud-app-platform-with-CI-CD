name: Destroy Dev Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm DEV infrastructure teardown"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    env:
      TF_VAR_region: ${{ secrets.TF_DEV_REGION }}
      TF_VAR_frontend_image: ${{ secrets.TF_DEV_FRONTEND_IMAGE }}
      TF_VAR_db_image: ${{ secrets.TF_DEV_DB_IMAGE }}
      TF_VAR_db_password: ${{ secrets.TF_DEV_DB_PASSWORD }}

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "❌ Destruction not confirmed"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::910541869155:role/github-actions-role
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Generate terraform.tfvars
        run: |
          cat <<'EOF' > infra/environments/dev/terraform.tfvars
          region        = "${{ secrets.TF_DEV_REGION }}"
          frontend_image = "${{ secrets.TF_DEV_FRONTEND_IMAGE }}"
          db_image       = "${{ secrets.TF_DEV_DB_IMAGE }}"
          db_password    = "${{ secrets.TF_DEV_DB_PASSWORD }}"
          EOF

      - name: Terraform Init
        working-directory: infra/environments/dev
        run: terraform init -input=false

      - name: Terraform Destroy
        working-directory: infra/environments/dev
        run: terraform destroy -var-file=terraform.tfvars -auto-approve

      - name: Cleanup generated tfvars
        if: always()
        run: rm -f infra/environments/dev/terraform.tfvars

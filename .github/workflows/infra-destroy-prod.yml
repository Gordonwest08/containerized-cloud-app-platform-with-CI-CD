name: Destroy Prod Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY-PROD to confirm"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Safety check
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY-PROD" ]; then
            echo "Confirmation text mismatch. Aborting."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::910541869155:role/github-actions-role
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (prod)
        working-directory: infra/environments/prod
        run: terraform init -reconfigure

      - name: Terraform Destroy (prod)
        working-directory: infra/environments/prod
        run: terraform destroy -auto-approve
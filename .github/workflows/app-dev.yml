
name: Build & Deploy App (Dev)

on:
  push:
    branches: [ "dev" ]
    paths:
      - "frontend/**"
      - "backend/**"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-role
          aws-region: us-east-1

      - name: Login to ECR
        run: aws ecr get-login-password \
          | docker login --username AWS --password-stdin \
            123456789012.dkr.ecr.us-east-1.amazonaws.com

      - name: Build Image
        run: |
          docker build -t frontend:${{ github.sha }} frontend/
          docker tag frontend:${{ github.sha }} \
          123456789012.dkr.ecr.us-east-1.amazonaws.com/frontend:${{ github.sha }}

      - name: Push Image
        run: docker push 123456789012.dkr.ecr.us-east-1.amazonaws.com/frontend:${{ github.sha }}

      - name: Update ECS Service
        run: |
          aws ecs update-service \
            --cluster dev-cluster \
            --service frontend \
            --force-new-deployment